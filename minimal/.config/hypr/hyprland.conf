
########################################################################################
AUTOGENERATED HYPR CONFIG.
PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki (basic and advanced configuring)
#

autogenerated=0

monitor=DP-3,1920x1080@60,0x0,1
monitor=HDMI-A-1,1920x1080@60,1920x0,1
monitor=DVI-I-1,1920x1080@60,3840x0,1
#monitor=DP-3,disable
#monitor=DVI-I-1,disable

workspace=HDMI-A-1,1
workspace=DP-3,7
workspace=DVI-I-1,6

input {
    kb_layout=pl
    kb_variant=
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1
    force_no_accel=1

    touchpad {
        natural_scroll=no
    }
}

general {
    sensitivity=0.8
    main_mod=SUPER

    layout=master

    gaps_in=2
    gaps_out=4
    border_size=2
    col.active_border=0xffee1111
    col.inactive_border=0x00333333

    apply_sens_to_raw=0
    damage_tracking=full
}

decoration {
    rounding=6
    multisample_edges=1
    #inactive_opacity=0.9

    drop_shadow=0

    blur=1
    blur_new_optimizations=1
    blur_size=8 # minimum 1
    blur_passes=2 # minimum 1, more passes = more resource intensive.
    # Your blur "amount" is blur_size * blur_passes, but high blur_size (over around 5-ish) will produce artifacts.
    # if you want heavy blur, you need to up the blur_passes.
    # the more passes, the more you can up the blur_size without noticing artifacts.
}

animations {
    enabled=1
    animation=windows,1,1,default
    animation=border,1,1,default
    animation=fade,1,3,default
    animation=workspaces,1,1,default
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
}

master {
	special_scale_factor=0.6
	new_is_master=1
	new_on_top=1
	no_gaps_when_only=0
}

gestures {
    workspace_swipe=no
}

misc:animate_manual_resizes=1

#disable_hyprland_logo=1
#disable_splash_rendering=1

# example window rules
# for windows named/classed as abc and xyz
windowrule=opacity 0.9,foot
windowrule=float,galculator
windowrule=move 1570 715,galculator

windowrule=float,title:^(Welcome to JetBrains)(.*)$
windowrule=center,title:^(Welcome to JetBrains)(.*)$ 
#windowrule=size 420 69,abc
#windowrule=tile,xyz
#windowrule=float,abc
#windowrule=pseudo,abc
#windowrule=monitor 0,xyz

# example binds
bind=SUPER,Q,killactive,
bind=SUPER,F,fullscreen,
bind=SUPER,RETURN,exec,foot
bind=SUPER,C,exec,galculator
bind=SUPER+SHIFT,E,exit,

bind=SUPER,E,exec,nautilus
bind=SUPER,B,exec,firefox
bind=SUPER,D,exec,wofi --show drun -o HDMI-A-1
bind=SUPER+SHIFT,W,exec,~/.config/wall.sh "/usr/share/backgrounds/gnome/"
bind=SUPER+ALT+CONTROL,L,exec,swaylock

bind=SUPERSHIFT,Space,togglefloating

bind=SUPERSHIFT,RETURN,layoutmsg,swapwithmaster
bind=SUPER,J,layoutmsg,cyclenext
bind=SUPER,K,layoutmsg,cycleprev

bind=SUPER,H,resizeactive,-40 0
bind=SUPER,J,resizeactive,0 40
bind=SUPER,K,resizeactive,0 -40
bind=SUPER,L,resizeactive,40 0

binde=SUPERALT,H,moveactive,-40 0
binde=SUPERALT,J,moveactive,0 40
binde=SUPERALT,K,moveactive,0 -40
binde=SUPERALT,L,moveactive,40 0

binde=SUPER,left,movefocus,l
binde=SUPER,right,movefocus,r
binde=SUPER,up,movefocus,u
binde=SUPER,down,movefocus,d

#MEDIA
bindl=,XF86AudioRaiseVolume,exec,pamixer -i 3
bindl=,XF86AudioLowerVolume,exec,pamixer -d 3
bindl=,XF86AudioMute,exec,pamixer --toggle-mute
bindl=,XF86AudioMedia,exec,playerctl play-pause
bindl=,XF86AudioPlay,exec,playerctl play-pause
bindl=,XF86AudioNext,exec,playerctl next
bindl=,XF86AudioPrev,exec,playerctl prev

bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10
bind=SUPER,S,togglespecialworkspace

bind=ALT,1,movetoworkspacesilent,1
bind=ALT,2,movetoworkspacesilent,2
bind=ALT,3,movetoworkspacesilent,3
bind=ALT,4,movetoworkspacesilent,4
bind=ALT,5,movetoworkspacesilent,5
bind=ALT,6,movetoworkspacesilent,6
bind=ALT,7,movetoworkspacesilent,7
bind=ALT,8,movetoworkspacesilent,8
bind=ALT,9,movetoworkspacesilent,9
bind=ALT,0,movetoworkspacesilent,10
bind=SUPERSHIFT,s,movetoworkspacesilent,special


bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1
